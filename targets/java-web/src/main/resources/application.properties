server.port=8080

# DB config (overridden by env vars in docker-compose). allowMultiQueries enables stacked SQLi.
spring.datasource.url=jdbc:mysql://localhost:3306/vulnapp?allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# VULN: verbose error pages leak stack traces to the client (CWE-209)
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

# VULN: session cookie without Secure/HttpOnly hardening (CWE-614 / CWE-1004)
server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.secure=false

# VULN:VULN-35:CWE-1021:config no X-Frame-Options / CSP frame-ancestors -> clickjacking (app never sets them)

spring.thymeleaf.cache=false
