# Intentionally insecure SQL schema + stored procedures — local lab only.
services:
  db:
    image: mysql:8.0
    container_name: vuln-sql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vulnsql
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - ./db:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
